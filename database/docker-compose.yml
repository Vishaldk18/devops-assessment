version: "3.9"

services:
  mysql:
    image: mysql:8.0

    container_name: hotel-booking-db

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  mysql_data: